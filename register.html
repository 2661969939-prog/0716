<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>用户注册 - 多中心数据平台</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="login-body">
    <main class="login-page">
      <section class="login-hero" aria-label="用户注册">
        <div class="platform-seal" aria-hidden="true">平台</div>
        <h1>卵巢肿瘤影像<br />数据收集平台</h1>
        <div class="login-card register-card">
          <div class="login-brand-panel">
            <div class="login-logo text-logo" aria-hidden="true">平台</div>
            <strong>用户注册</strong>
            <span>注册审核通过后，可进入病例数据采集、上传与审核工作台。</span>
          </div>
          <form class="login-form" action="./index.html?authed=1">
            <h2>注册账号 / USER REGISTER</h2>
            <label>联系人<input required placeholder="请输入联系人" autocomplete="name" /></label>
            <label>手机号<input required placeholder="请输入手机号" autocomplete="tel" /></label>
            <label>所属机构<select required><option>牵头中心</option><option>协作中心</option><option>区域分中心</option></select></label>
            <label>设置密码<input required type="password" placeholder="请输入密码" autocomplete="new-password" /></label>
            <div class="login-warning">演示原型：点击注册后进入平台工作台</div>
            <button class="primary login-submit" type="submit">注册并进入平台</button>
            <a class="form-link" href="./login.html">已有账号，返回登录</a>
          </form>
        </div>
      </section>
    </main>
  </body>
</html>
